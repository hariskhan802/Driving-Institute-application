
    <div class="x_panel" ng-init="sCtrl.allStd()" >
        <div class="x_title" >
          <h2>Student</h2><a ui-sref="student/add" class="btn btn-primary" style="margin-left: 4%;">Add New Student</a>
          <ul class="nav navbar-right panel_toolbox">
            <li class="dropdown">
              <input type="text" class="form-control" ng-model="search_std" placeholder="Search.." />  
            </li>
          
          </ul>
          <div class="clearfix"></div>
        </div>
        <div class="x_content">

          <table class="table table-striped">
            <thead>
              <tr>
                <th>#</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Social sec No.</th>
                <th>Cell No.</th>
                <th>Edit</th>
                <th>Delete</th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="std in sCtrl.students | filter:search_std ">
                <td>{{ std.id }}</td>
                <td>{{ std.first_name }}</td>
                <td>{{ std.last_name }}</td>
                <td>{{ std.social_sec_no }}</td>
                <td>{{ std.cell_no }}</td>
                <td><a  ui-sref="student/edit({id : std.id })" class="btn btn-primary">Edit</a></td>
                <td><a ng-click="sCtrl.deletStd(std.id)" class="btn btn-danger">Delete</a></td>
                
              </tr>
              
            </tbody>
          </table>

        </div>
      </div>
