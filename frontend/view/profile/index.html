
<div class="x_panel cus-form">
    <div class="x_title">
        <h2>Profile</h2>
        <ul class="nav navbar-right panel_toolbox">
            
        </ul>
        <div class="clearfix"></div>
    </div>
    <div class="x_content" >
        <br>
        <form method="post"  class="form-horizontal form-label-left" id="add-form" ng-submit="pCtrl.updatePro()" enctype="multipart/form-data">

            <div class="form-group">
                <label class="control-label col-md-3 col-sm-3 col-xs-12">Name</label>
                <div class="col-md-9 col-sm-9 col-xs-12">
                    <input type="text" ng-model="pCtrl.f.name" class="form-control" placeholder="Name " required="">
                    
                </div>
            </div>
            <div class="form-group">
                <label class="control-label col-md-3 col-sm-3 col-xs-12">Email</label>
                <div class="col-md-9 col-sm-9 col-xs-12">
                    <input type="email" ng-model="pCtrl.f.email" class="form-control" placeholder="Email" required="">
                    
                </div>
            </div>
            <div class="form-group">
                <label class="control-label col-md-3 col-sm-3 col-xs-12">Password</label>
                <div class="col-md-9 col-sm-9 col-xs-12">
                    <input type="password" ng-model="pCtrl.f.pass" class="form-control" placeholder="Password" required="">
                    
                </div>
            </div>
           
            
            <div class="ln_solid"></div>
            <div class="form-group">
                <div class="col-md-9 col-sm-9 col-xs-12 col-md-offset-3">
                    
                    <!-- <button type="reset" class="btn btn-primary">Reset</button> -->
                    <button type="submit" class="btn btn-success">Submit</button>
                </div>
            </div>

        </form>
    </div>
</div>
