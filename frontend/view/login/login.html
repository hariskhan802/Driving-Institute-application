<a class="hiddenanchor" id="signup"></a>

      <a class="hiddenanchor" id="signin"></a>

      <div class="reg_wrapper">

        

        <div class="x_panel">

                  <div class="x_title">

                    <h2>Login </h2>

                    <ul class="nav navbar-right panel_toolbox">

                    </ul>

                    <div class="clearfix"></div>

                  </div>

                  <div class="x_content">

                    <br>

                    <form autocomplete="true" class="form-horizontal form-label-left input_mask" method="post" ng-submit="lCtrl.login()">


                      <div class="col-md-12 col-sm-6 col-xs-12 form-group has-feedback">

                        <input type="email" class="form-control has-feedback-left" placeholder="Email" name="email"  ng-model="lCtrl.l.email" required="">

                        <span class="fa fa-envelope form-control-feedback left" aria-hidden="true"></span>

                      </div>



                      <div class="col-md-12 col-sm-6 col-xs-12 form-group has-feedback">

                        <input type="password" class="form-control has-feedback-left"  name="password"  placeholder="Password" ng-model="lCtrl.l.password" required="">

                        <span class="fa fa-unlock-alt form-control-feedback left" aria-hidden="true"></span>

                      </div>

                      <div class="form-group">

                          <button type="submit" name="register" class="btn btn-success pull-right">Login</button>

                          <!-- <a ui-sref="forget" style="margin: 0 13px;">Forgotten password?</a> -->


                      </div>



                    </form>

                  </div>

                </div>  



        

      </div>
